<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 — 오늘의 채용 브리핑</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" sizes="16x16 32x32 48x48">
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-demo="{{demoMode}}">
  <div class="wrap login-wrap">
    <header>
      <div>
        <p class="eyebrow">관리자</p>
        <h1>로그인</h1>
      </div>
      <div class="head-right">
        <button id="theme-toggle" class="theme-toggle" type="button" title="테마 (자동·낮·밤)"></button>
      </div>
    </header>

    <main class="login-main">
      {{if .Error}}<p class="form-error" role="alert">{{.Error}}</p>{{end}}
      <form class="login-form" method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label>이메일
          <input type="email" name="email" autocomplete="username" value="{{.Email}}" required autofocus>
        </label>
        <label>비밀번호
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="btn-primary">로그인 <span class="arrow">→</span></button>
      </form>
    </main>
  </div>
  <script src="/static/theme.js"></script>
</body>
</html>
