<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>프로필 — 오늘의 채용 브리핑</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" sizes="16x16 32x32 48x48">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <p class="eyebrow">프로필</p>
        <h1>설정</h1>
      </div>
      <div class="head-right">
        <button id="theme-toggle" class="theme-toggle" type="button" title="테마 (자동·낮·밤)"></button>
      </div>
    </header>

    <nav class="primary">
      <a href="/">데일리 브리핑</a>
      <a href="/archive">관심 공고</a>
      <a href="/bookmarks">북마크</a>
      <a href="/hidden">숨긴 공고</a>
      <a href="/profile" class="active">프로필 설정</a>
    </nav>

    <p class="form-intro">이 정보로 매일의 공고에 점수를 매겨요. 언제든 다시 바꿀 수 있어요.</p>

    <form method="post" action="/profile">
      <label>경력 (년)
        <span class="field-hint">햇수로 적어주세요. 신입이면 0.</span>
        <input type="number" name="career_years" min="0" value="{{.CareerYears}}">
      </label>

      <label>경력 가중치
        <span class="field-hint">경력 조건이 맞을 때 더해줄 점수 (기본 25).</span>
        <input type="number" name="career_weight" min="0" value="{{.CareerWeight}}">
        <span class="field-hint derived">경력이 한 단계 차이로 근접하면 <strong id="derive-career">{{.CareerNearMiss}}</strong>점이 들어가요.</span>
      </label>

      <label>희망 연봉 하한 (만원)
        <span class="field-hint">상관없으면 0으로 두세요.</span>
        <input type="number" name="salary_floor_man" min="0" value="{{.SalaryFloorMan}}">
      </label>

      <label>연봉 가중치
        <span class="field-hint">연봉 정보가 충족될 때 더해줄 점수 (기본 10).</span>
        <input type="number" name="salary_weight" min="0" value="{{.SalaryWeight}}">
        <span class="field-hint derived">연봉 정보는 있지만 금액이 불분명하면 <strong id="derive-salary">{{.SalaryAmbiguous}}</strong>점이 들어가요.</span>
      </label>

      <label>최저 점수
        <span class="field-hint">이 점수 미만의 공고는 숨겨요 — 기본 40, 0이면 모두 보여요.</span>
        <input type="number" name="min_score" min="0" value="{{.MinScore}}">
      </label>

      <label>최종 학력
        <span class="field-hint">요구 학력이 이보다 높은 공고는 조용히 제외돼요.</span>
        <select name="max_education">
          <option value="0"{{if eq .MaxEducation 0}} selected{{end}}>학력 무관</option>
          <option value="1"{{if eq .MaxEducation 1}} selected{{end}}>고등학교 졸업</option>
          <option value="2"{{if eq .MaxEducation 2}} selected{{end}}>전문대 졸업</option>
          <option value="3"{{if eq .MaxEducation 3}} selected{{end}}>대학교 졸업</option>
          <option value="4"{{if eq .MaxEducation 4}} selected{{end}}>대학원 졸업</option>
        </select>
      </label>

      <label>기술 스택
        <span class="field-hint">한 줄에 하나, "이름,가중치" 형식. 예: React,20</span>
        <textarea name="stacks" rows="5">{{.StacksText}}</textarea>
      </label>

      <label>희망 근무지
        <span class="field-hint">쉼표로 구분해주세요. 예: 서울, 판교</span>
        <input type="text" name="cities" value="{{.CitiesText}}">
      </label>

      <label>근무지 가중치
        <span class="field-hint">희망 지역과 맞을 때 더해줄 점수 (최대 15).</span>
        <input type="number" name="location_weight" min="0" value="{{.LocationWeight}}">
      </label>

      <label class="check">
        <input type="checkbox" name="remote_ok"{{if .RemoteOK}} checked{{end}}> 재택근무 가능
      </label>

      {{if .Sources}}
      <fieldset class="source-toggles">
        <legend>공고 출처</legend>
        <span class="field-hint">체크 해제한 출처의 공고는 브리핑과 관심 공고에서 숨겨져요. 저장한 공고는 그대로 보여요.</span>
        {{range .Sources}}
        <label class="check">
          <input type="checkbox" name="source_{{.ID}}"{{if .Enabled}} checked{{end}}> {{.Label}}
        </label>
        {{end}}
      </fieldset>
      {{end}}

      <label>필수 키워드
        <span class="field-hint">한 줄에 하나. 모두 포함된 공고만 점수를 받아요.</span>
        <textarea name="must_have" rows="3">{{.MustHaveText}}</textarea>
      </label>

      <label>제외 키워드
        <span class="field-hint">한 줄에 하나. 하나라도 있으면 공고를 제외해요.</span>
        <textarea name="dealbreakers" rows="3">{{.DealbreakersText}}</textarea>
      </label>

      <p class="hint">키워드는 어근만 적어주세요. "개발자"는 "개발"과 다르게 취급되고,
        "야근 없음" 같은 부정 표현은 "야근"과 구분하지 못해요. 짧고 분명한 단어가 가장 잘 맞아요.</p>

      <div class="form-actions">
        <button type="submit" class="btn-primary">저장하고 브리핑 보기 <span class="arrow">→</span></button>
      </div>
    </form>
  </div>

  <script src="/static/theme.js"></script>
  <script src="/static/not-interested.js"></script>
  <script src="/static/weight-hint.js" defer></script>
</body>
</html>
