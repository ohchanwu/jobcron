<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>신입 IT Job Briefing</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>오늘의 채용 브리핑</h1>
    <a href="/profile">프로필 수정</a>
  </header>
  <p>
    <button id="scrape">스크랩 시작</button>
  </p>
  <div id="scrape-log" class="scrape-log" aria-live="polite"></div>
  <main>
    {{if .Postings}}
    <ol class="postings">
      {{range .Postings}}
      <li class="{{if .Excluded}}excluded{{end}}">
        <span class="score">{{if .Excluded}}제외됨{{else}}{{.Total}}점{{end}}</span>
        <a href="{{.Posting.URL}}">{{.Posting.Title}}</a>
        <span class="company">{{.Posting.Company}}</span>
        {{if .Explanation}}<div class="why">{{.Explanation}}</div>{{end}}
      </li>
      {{end}}
    </ol>
    {{else}}
    <p class="empty">아직 공고가 없어요. "스크랩 시작"을 눌러 오늘의 공고를 받아보세요.</p>
    {{end}}
  </main>
  <script>
    (function () {
      const btn = document.getElementById("scrape");
      const log = document.getElementById("scrape-log");
      if (!btn) return;

      btn.addEventListener("click", function () {
        btn.disabled = true;
        log.textContent = "";
        const es = new EventSource("/api/scrape");

        function append(msg) {
          const p = document.createElement("p");
          p.textContent = msg;
          log.appendChild(p);
        }
        function progress(msg) {
          let pr = document.getElementById("scrape-progress");
          if (!pr) {
            pr = document.createElement("p");
            pr.id = "scrape-progress";
            log.appendChild(pr);
          }
          pr.textContent = msg;
        }

        es.addEventListener("status", (e) => append(e.data));
        es.addEventListener("count", (e) => append(e.data));
        es.addEventListener("progress", (e) => progress(e.data));
        es.addEventListener("done", function () {
          es.close();
          location.reload();
        });
        es.addEventListener("failed", function (e) {
          es.close();
          btn.disabled = false;
          append(e.data || "스크랩에 실패했어요.");
        });
        es.addEventListener("error", function () {
          es.close();
          btn.disabled = false;
          append("연결이 끊겼어요. 잠시 후 다시 시도해 주세요.");
        });
      });
    })();
  </script>
</body>
</html>
