# GoReleaser config — cross-compiles jobcron and its importer for every target.
# Validate with `goreleaser check`; dry-run with `goreleaser release --snapshot --clean`.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: jobcron
    main: ./cmd/jobcron
    binary: jobcron
    env:
      - CGO_ENABLED=0 # modernc.org/sqlite is pure Go — fully static builds
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64 # not a v1 target
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
  - id: jobcron-import
    main: ./cmd/jobcron-import
    binary: jobcron-import
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    ids:
      - jobcron
      - jobcron-import
    # Version-free names so README install URLs (releases/latest/download/...)
    # stay stable across releases.
    name_template: "jobcron_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ohchanwu
    name: jobcron
  # Mark pre-release tags (-alpha / -beta / -rc) as GitHub prereleases so they
  # do NOT become "latest". The archives use version-free names served from
  # releases/latest/download/… (the README install URLs), so an alpha must not
  # hijack the stable download.
  prerelease: auto

changelog:
  use: github
