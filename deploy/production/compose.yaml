# Production deployment stack for https://jobcron.app.
#
# This compose file intentionally differs from deploy/demo:
# - pulls a prebuilt image instead of building on EC2
# - uses AWS RDS PostgreSQL through DATABASE_URL
# - runs the private owner-login app, not read-only demo mode
# - leaves Worknet and proxy-secret support disabled for the first pass
services:
  app:
    image: "${JOBCRON_IMAGE:?set JOBCRON_IMAGE in .env}"
    pull_policy: always
    command:
      - --no-open
      - --host
      - 0.0.0.0
      - --port
      - "7777"
    environment:
      JOBCRON_ENV: production
      JOBCRON_HOST: 0.0.0.0
      JOBCRON_PORT: "7777"
      JOBCRON_NO_OPEN: "1"
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL in .env}"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET in .env}"
      JOBCRON_SCHEDULER_ENABLED: "1"
      JOBCRON_DAILY_SCRAPE_TIME: "05:00"
    expose:
      - "7777"
    volumes:
      - jobcron_config:/root/.config/jobcron
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  jobcron_config:
    name: jobcron_config
  caddy_data:
  caddy_config:
