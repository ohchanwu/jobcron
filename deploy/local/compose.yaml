services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: jobcron_dev
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - jobcron-postgres18-cluster:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobcron_dev"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  jobcron-postgres18-cluster:
    name: jobcron-postgres18-cluster
