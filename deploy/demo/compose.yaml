# Demo-only deployment stack for https://demo.jobcron.app.
#
# This compose file intentionally runs the read-only public demo:
# - SQLite database mounted at /data/jobs.db
# - --demo mode enabled
# - no production login/session configuration
# - no RDS/PostgreSQL DATABASE_URL
#
# Do not use this file for the private production app at jobcron.app.
services:
  app:
    image: "${JOBCRON_IMAGE:?set JOBCRON_IMAGE in .env}"
    pull_policy: never
    command:
      - --no-open
      - --demo
      - --host
      - 0.0.0.0
      - --db
      - /data/jobs.db
    environment:
      JOBCRON_DEMO: "1"
      JOBCRON_ADMIN_TOKEN: "${JOBCRON_ADMIN_TOKEN:?set JOBCRON_ADMIN_TOKEN in .env}"
      JOBCRON_PROXY_SECRET: "${JOBCRON_PROXY_SECRET:?set JOBCRON_PROXY_SECRET in .env}"
    volumes:
      - /srv/jobcron/data:/data
    ports:
      - "127.0.0.1:7777:7777"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - app
    environment:
      JOBCRON_PROXY_SECRET: "${JOBCRON_PROXY_SECRET:?set JOBCRON_PROXY_SECRET in .env}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
